kind = "web"
previewPath = "/"
title = "NBA Fandom Survey"
version = "1.0.0"
id = "artifacts/nba-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26165

[services.development]
run = "pnpm --filter @workspace/nba-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nba-survey", "run", "build" ]
publicDir = "artifacts/nba-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26165"
BASE_PATH = "/"
